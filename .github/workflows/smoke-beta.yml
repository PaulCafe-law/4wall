name: Beta Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "render.yaml"
      - "planner-server/**"
      - "web-app/**"
      - ".github/workflows/smoke-beta.yml"

jobs:
  smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check required deployment variables
        env:
          BETA_API_BASE_URL: ${{ vars.BETA_API_BASE_URL }}
          WEB_LOGIN_URL: ${{ vars.BETA_WEB_LOGIN_URL }}
          BETA_APP_ORIGIN: ${{ vars.BETA_APP_ORIGIN }}
          BETA_WEB_SMOKE_ADMIN_EMAIL: ${{ secrets.BETA_WEB_SMOKE_ADMIN_EMAIL || secrets.BETA_WEB_SMOKE_EMAIL }}
          BETA_WEB_SMOKE_ADMIN_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_ADMIN_PASSWORD || secrets.BETA_WEB_SMOKE_PASSWORD }}
          BETA_WEB_SMOKE_VIEWER_EMAIL: ${{ secrets.BETA_WEB_SMOKE_VIEWER_EMAIL }}
          BETA_WEB_SMOKE_VIEWER_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_VIEWER_PASSWORD }}
        run: |
          missing=()
          echo "VIEWER_SMOKE_ENABLED=false" >> "$GITHUB_ENV"
          for name in BETA_API_BASE_URL WEB_LOGIN_URL BETA_APP_ORIGIN BETA_WEB_SMOKE_ADMIN_EMAIL BETA_WEB_SMOKE_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required smoke configuration: ${missing[*]}"
            exit 1
          fi
          if [ -z "$BETA_WEB_SMOKE_VIEWER_EMAIL" ] || [ -z "$BETA_WEB_SMOKE_VIEWER_PASSWORD" ]; then
            echo "Viewer smoke credentials not configured; viewer-only smoke will be skipped."
          else
            echo "VIEWER_SMOKE_ENABLED=true" >> "$GITHUB_ENV"
            echo "Viewer smoke credentials present."
          fi
          echo "Deployment variables present."
      - name: Install smoke dependencies
        run: python -m pip install -r planner-server/requirements.txt
      - name: API health
        env:
          BETA_API_BASE_URL: ${{ vars.BETA_API_BASE_URL }}
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "$BETA_API_BASE_URL/healthz"; then
              exit 0
            fi
            sleep 10
          done
          echo "API health never became ready"
          exit 1
      - name: Web login route
        env:
          WEB_LOGIN_URL: ${{ vars.BETA_WEB_LOGIN_URL }}
        run: |
          for attempt in $(seq 1 30); do
            body=$(curl --fail --silent --show-error "$WEB_LOGIN_URL") || true
            if printf '%s' "$body" | grep -q '<div id="root"></div>' && printf '%s' "$body" | grep -q 'type="module"'; then
              exit 0
            fi
            sleep 10
          done
          echo "Web login route never became ready"
          exit 1
      - name: Install Playwright browser smoke dependencies
        working-directory: web-app
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Browser admin login smoke
        working-directory: web-app
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.BETA_APP_ORIGIN }}
          PW_WEB_SMOKE_ADMIN_EMAIL: ${{ secrets.BETA_WEB_SMOKE_ADMIN_EMAIL || secrets.BETA_WEB_SMOKE_EMAIL }}
          PW_WEB_SMOKE_ADMIN_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_ADMIN_PASSWORD || secrets.BETA_WEB_SMOKE_PASSWORD }}
        run: npx playwright test tests/e2e/deployed-login.spec.ts
      - name: Browser viewer role smoke
        if: ${{ env.VIEWER_SMOKE_ENABLED == 'true' }}
        working-directory: web-app
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.BETA_APP_ORIGIN }}
          PW_WEB_SMOKE_VIEWER_EMAIL: ${{ secrets.BETA_WEB_SMOKE_VIEWER_EMAIL }}
          PW_WEB_SMOKE_VIEWER_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_VIEWER_PASSWORD }}
        run: npx playwright test tests/e2e/deployed-viewer.spec.ts
      - name: Web beta admin authenticated smoke
        working-directory: planner-server
        env:
          BETA_API_BASE_URL: ${{ vars.BETA_API_BASE_URL }}
          BETA_APP_ORIGIN: ${{ vars.BETA_APP_ORIGIN }}
          BETA_WEB_SMOKE_ADMIN_EMAIL: ${{ secrets.BETA_WEB_SMOKE_ADMIN_EMAIL || secrets.BETA_WEB_SMOKE_EMAIL }}
          BETA_WEB_SMOKE_ADMIN_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_ADMIN_PASSWORD || secrets.BETA_WEB_SMOKE_PASSWORD }}
        run: |
          python scripts/smoke_test.py \
            --mode web-admin \
            --base-url "$BETA_API_BASE_URL" \
            --web-email "$BETA_WEB_SMOKE_ADMIN_EMAIL" \
            --web-password "$BETA_WEB_SMOKE_ADMIN_PASSWORD" \
            --app-origin "$BETA_APP_ORIGIN"
      - name: Web beta viewer read-only smoke
        if: ${{ env.VIEWER_SMOKE_ENABLED == 'true' }}
        working-directory: planner-server
        env:
          BETA_API_BASE_URL: ${{ vars.BETA_API_BASE_URL }}
          BETA_APP_ORIGIN: ${{ vars.BETA_APP_ORIGIN }}
          BETA_WEB_SMOKE_VIEWER_EMAIL: ${{ secrets.BETA_WEB_SMOKE_VIEWER_EMAIL }}
          BETA_WEB_SMOKE_VIEWER_PASSWORD: ${{ secrets.BETA_WEB_SMOKE_VIEWER_PASSWORD }}
        run: |
          python scripts/smoke_test.py \
            --mode web-viewer \
            --base-url "$BETA_API_BASE_URL" \
            --web-email "$BETA_WEB_SMOKE_VIEWER_EMAIL" \
            --web-password "$BETA_WEB_SMOKE_VIEWER_PASSWORD" \
            --app-origin "$BETA_APP_ORIGIN"
